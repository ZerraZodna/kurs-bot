name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    # Environment for CI: run real embedding code (install deps below)
    env:
      # Force-disable real Ollama calls in CI to avoid external network calls
      # while still allowing developers to opt-in locally via .env.
      TEST_USE_REAL_OLLAMA: '0'
      # Use the lightweight test embedding backend in CI to avoid pulling
      # large local models during GitHub runs; tests rely on deterministic
      # precomputed trigger embeddings seeded earlier.
      EMBEDDING_BACKEND: 'none'
      # Set to 'true' to skip pre-downloading large SentenceTransformer model
      SKIP_MODEL_PRECACHE: 'true'
    

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Install only the project requirements for CI; avoid heavy ML packages
          # unless explicitly enabled via SKIP_MODEL_PRECACHE=false and other
          # opt-in flags.
          pip install --no-cache-dir -r requirements.txt
      - name: Pre-download SentenceTransformer model (optional)
        if: ${{ env.SKIP_MODEL_PRECACHE != 'true' }}
        run: |
          python - <<'PY'
          import os
          from huggingface_hub import snapshot_download
          model_name = "all-MiniLM-L6-v2"
          repo_id = f"sentence-transformers/{model_name}"
          out_dir = os.path.join('src', 'data', 'models', model_name.replace('/', '_'))
          os.makedirs(out_dir, exist_ok=True)
          print(f"Downloading HF snapshot '{repo_id}' into {out_dir}")
          snapshot_download(repo_id=repo_id, cache_dir=out_dir, local_dir=out_dir, allow_patterns=["*"], resume_download=True)
          print("Saved model snapshot to local cache")
          PY
      - name: Prepare env
        run: |
          if [ -f .env.template ]; then
            cp .env.template .env
            echo "Copied .env.template to .env"
            # Ensure CI forces test-mode for Ollama (avoid real Ollama calls)
            echo "TEST_USE_REAL_OLLAMA=False" >> .env
          else
            echo ".env.template not found, skipping copy"
          fi

      - name: Seed deterministic trigger embeddings
        run: python scripts/ci_seed_triggers.py

      - name: Run tests
        run: pytest -q
