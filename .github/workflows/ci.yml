name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    # Environment for CI: run real embedding code (install deps below)
    env:
      # Force-disable real Ollama calls in CI to avoid external network calls
      # while still allowing developers to opt-in locally via .env.
      TEST_USE_REAL_OLLAMA: '0'
      # Mark CI as test environment so background threads stay off and test DB is enforced
      IS_TEST_ENV: '1'

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Install project requirements for CI
          pip install -r requirements.txt
      - name: Lint
        run: |
          ruff check . --output-format=github
          ruff format --check .
      # No model pre-download needed (embeddings removed)
      - name: Prepare env
        run: |
          if [ -f .env.template ]; then
            cp .env.template .env
            echo "Copied .env.template to .env"
            # Ensure CI forces test-mode for Ollama (avoid real Ollama calls)
            echo "TEST_USE_REAL_OLLAMA=False" >> .env
          else
            echo ".env.template not found, skipping copy"
          fi
      - name: Run tests
        run: pytest -q
