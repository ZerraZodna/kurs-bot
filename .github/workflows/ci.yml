name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    # Environment for CI: run real embedding code (install deps below)
    env:
      TEST_USE_REAL_OLLAMA: 'True'
      EMBEDDING_BACKEND: 'local'
    

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Install CPU-only PyTorch wheel first (pin to avoid accidental CUDA wheels)
          # Use torch 2.4.x+cpu which is compatible with recent sentence-transformers
          pip install --no-cache-dir torch==2.4.1+cpu --index-url https://download.pytorch.org/whl/cpu
          pip install --no-cache-dir sentence-transformers hnswlib
          # Install project requirements
          pip install --no-cache-dir -r requirements.txt
      - name: Pre-download SentenceTransformer model
        uses: actions/cache@v4
        with:
          path: src/data/models
          key: model-cache-all-MiniLM-L6-v2-${{ runner.os }}
          restore-keys: |
            model-cache-all-MiniLM-L6-v2-

      - name: Pre-download SentenceTransformer model
        run: |
          python - <<'PY'
          import os
          from huggingface_hub import snapshot_download
          model_name = "all-MiniLM-L6-v2"
          repo_id = f"sentence-transformers/{model_name}"
          out_dir = os.path.join('src', 'data', 'models', model_name.replace('/', '_'))
          os.makedirs(out_dir, exist_ok=True)
          print(f"Downloading HF snapshot '{repo_id}' into {out_dir}")
          snapshot_download(repo_id=repo_id, cache_dir=out_dir, local_dir=out_dir, allow_patterns=["*"], resume_download=True)
          print("Saved model snapshot to local cache")
          PY
      - name: Prepare env
        run: |
          if [ -f .env.template ]; then
            cp .env.template .env
            echo "Copied .env.template to .env"
            # Ensure CI forces real-embedding mode regardless of template
            echo "TEST_USE_REAL_OLLAMA=True" >> .env
          else
            echo ".env.template not found, skipping copy"
          fi

      - name: Run tests
        run: pytest -q
