name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    # Environment for CI: run real embedding code (install deps below)
    env:
      TEST_USE_REAL_OLLAMA: 'True'
      EMBEDDING_BACKEND: 'local'
    

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Install CPU-only PyTorch wheel first (pin to avoid accidental CUDA wheels)
          pip install --no-cache-dir torch==2.2.0+cpu --index-url https://download.pytorch.org/whl/cpu
          pip install --no-cache-dir sentence-transformers hnswlib
          # Install project requirements
          pip install --no-cache-dir -r requirements.txt
      - name: Pre-download SentenceTransformer model
        run: |
          python - <<'PY'
          import os
          from sentence_transformers import SentenceTransformer
          model_name = "all-MiniLM-L6-v2"
          out_dir = os.path.join('src', 'data', 'models', model_name.replace('/', '_'))
          os.makedirs(out_dir, exist_ok=True)
          print(f"Downloading SentenceTransformer '{model_name}' into {out_dir}")
          m = SentenceTransformer(model_name)
          try:
              m.save(out_dir)
              print(f"Saved model to {out_dir}")
          except Exception:
              print("Failed to save model to local cache, but model will still be available in HF cache")
          PY
      - name: Prepare env
        run: |
          if [ -f .env.template ]; then
            cp .env.template .env
            echo "Copied .env.template to .env"
            # Ensure CI forces real-embedding mode regardless of template
            echo "TEST_USE_REAL_OLLAMA=True" >> .env
          else
            echo ".env.template not found, skipping copy"
          fi

      - name: Run tests
        run: pytest -q
