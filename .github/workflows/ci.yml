name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies (CPU-only PyTorch for sentence-transformers)
        run: |
          python -m pip install --upgrade pip
          # Install CPU-only PyTorch wheel first to avoid CUDA packages on runners with limited disk
          pip install --no-cache-dir --extra-index-url https://download.pytorch.org/whl/cpu "torch==2.2.2+cpu"
          # Do not install heavy local embedding deps in CI; use test-mode embeddings
          # Then install the rest of the project requirements
          pip install --no-cache-dir -r requirements.txt
      - name: Prepare env
        run: |
          if [ -f .env.template ]; then
            cp .env.template .env
            echo "Copied .env.template to .env"
            # Ensure CI forces test-mode embedding regardless of template
            echo "TEST_USE_REAL_OLLAMA=False" >> .env
          else
            echo ".env.template not found, skipping copy"
          fi

      - name: Run tests
        run: pytest -q
