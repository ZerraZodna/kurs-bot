minimum_pre_commit_version: '3.0.0'

default_language_version:
  python: python3

repos:
  - repo: local
    hooks:
      - id: timezone-ban-check
        name: Ban direct timezone imports
        entry: bash -c 'grep -E -rn --include="*.py" --exclude="timezone.py" "^(from .*import.*ZoneInfo|from datetime.*timezone)" src/ || true'
        language: system
        pass_filenames: false

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: debug-statements
      - id: requirements-txt-fixer

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.8
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: pip-audit
        name: Pip-audit security scan
        entry: bash -c "pip install pip-audit >/dev/null 2>&1 || true && pip-audit --ignore-vuln CVE-2026-4539 --ignore-vuln GHSA-926x-3r5x-gfhw --ignore-vuln CVE-2026-39892 --ignore-vuln CVE-2026-1839"
        language: system
        pass_filenames: false
        always_run: true
        verbose: true

